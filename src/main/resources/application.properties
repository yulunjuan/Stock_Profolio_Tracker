spring.application.name=Stock_Profolio_Tracker

# Database Configuration - values loaded from environment variables
# Set these in IntelliJ Run Configuration > Environment Variables
# or in application-local.properties (gitignored)
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/portfolio_tracker}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD}

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Server
server.port=8080
